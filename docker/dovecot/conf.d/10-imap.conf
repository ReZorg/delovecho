# IMAP service configuration
# IMAP provides process-state querying: mailboxes map to process queues and
# message flags map to process states as defined in MailboxMapping.
#
# Mapping used by Dove9 MailProtocolBridge:
#   INBOX       -> ProcessState.PENDING   (new work arriving)
#   Processing  -> ProcessState.ACTIVE    (triadic loop running)
#   Sent        -> ProcessState.COMPLETED (response dispatched)
#   Drafts      -> ProcessState.SUSPENDED (paused for human review)
#   Spam        -> ProcessState.FAILED    (rejected by sanitizer/rate-limiter)
#   Trash       -> ProcessState.TERMINATED

service imap-login {
  inet_listener imap {
    port = 143
  }
  inet_listener imaps {
    port = 993
    ssl = yes
  }
  process_min_avail = 0
  vsz_limit = 64M
}

service imap {
  vsz_limit = 256M
}

namespace inbox {
  inbox = yes

  # Dove9 process-queue mailboxes
  mailbox Processing {
    auto = create
    special_use = \Flagged
  }
  mailbox Sent {
    auto = subscribe
    special_use = \Sent
  }
  mailbox Drafts {
    auto = subscribe
    special_use = \Drafts
  }
  mailbox Spam {
    auto = create
    special_use = \Junk
  }
  mailbox Trash {
    auto = subscribe
    special_use = \Trash
  }
}
