# Authentication configuration for development / testing
# In production, replace the static passdb with a proper backend
# (e.g., SQL, LDAP, or PAM).

auth_mechanisms = plain login

passdb {
  driver = static
  args = password=test
}

userdb {
  driver = static
  args = uid=dovecot gid=dovecot home=/var/mail/%u
}

service auth {
  unix_listener auth-userdb {
    mode = 0660
    user = dovecot
    group = dovecot
  }
}
