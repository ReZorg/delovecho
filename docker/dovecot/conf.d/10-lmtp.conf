# LMTP service configuration
# LMTP (RFC 2033) delivers mail locally to the Deep Tree Echo orchestrator.
# The orchestrator listens on the shared Unix socket and converts each delivery
# into a Dove9 MessageProcess for cognitive processing.

service lmtp {
  unix_listener /var/run/dovecot/lmtp.sock {
    mode = 0660
    user = dovecot
    group = dovecot
  }

  # Also expose via TCP for containerised setups where socket sharing is unavailable
  inet_listener lmtp {
    port = 24
    address = 127.0.0.1
  }
}

protocol lmtp {
  # Forward unknown recipients to Deep Tree Echo bot address
  lmtp_rcpt_check_quota = no
  postmaster_address = postmaster@localhost
}
