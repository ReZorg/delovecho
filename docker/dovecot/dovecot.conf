# Dovecot main configuration for Dove9-Deltecho integration
# This configuration wires Dovecot as the "cognitive CPU" mail server,
# exposing Milter and LMTP interfaces consumed by the Deep Tree Echo orchestrator.

# Base configuration includes
!include conf.d/*.conf

# Protocols enabled
protocols = imap lmtp

# Listen on all interfaces
listen = *

# Mail storage location
mail_location = maildir:/var/mail/%u

# Log settings
log_path = /dev/stderr
info_log_path = /dev/stdout

# Disable TLS for local-only / development use (override in production)
ssl = no

# Authentication
auth_mechanisms = plain login

# Maximum number of simultaneous connections per IP
mail_max_userip_connections = 20
