# dove9-cognitive plugin configuration for dovecho
#
# Place in /etc/dovecho/conf.d/90-dove9.conf (or include from dovecot.conf)
#
# This plugin bridges mail events into the Dove9 cognitive pipeline,
# treating the mail server as a cognitive processing unit (CPU).
# Every message delivery creates a Dove9 kernel process that traverses
# the 12-step triadic cognitive loop.

# Load the plugin for all mail-delivery protocols (LMTP, LDA, IMAP)
protocol lmtp {
  mail_plugins = $mail_plugins notify dove9_cognitive
}

protocol lda {
  mail_plugins = $mail_plugins notify dove9_cognitive
}

# Optional: also trigger on IMAP APPEND (user copies/saves mail)
protocol imap {
  mail_plugins = $mail_plugins notify dove9_cognitive
}

plugin {
  # Enable the cognitive pipeline
  dove9_cognitive_enabled = yes

  # Bot identity — responses are sent from this address
  dove9_bot_email = echo@dovecho.local

  # Triadic engine step duration (ms)
  # Lower = faster cognitive cycles, higher CPU
  # Default: 100
  dove9_step_duration_ms = 100

  # Maximum concurrent cognitive processes
  # Each incoming mail becomes a process in the Dove9 kernel
  # Default: 64
  dove9_max_processes = 64

  # Unix socket for milter integration (optional)
  # dove9_milter_socket = /var/run/dovecho/dove9-milter.sock
}
