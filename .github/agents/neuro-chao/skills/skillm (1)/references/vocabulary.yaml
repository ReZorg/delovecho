# Skillm Vocabulary: Action Verb Categories and MCP Tool Mappings
# Each verb category maps to concrete tool invocations across connectors.

categories:

  DISCOVER:
    description: Find entities matching criteria
    semantics: "Locate zero or more entities without modifying state"
    tools:
      notion: [notion-search]
      gmail: [gmail_search_messages]
      calendar: [google_calendar_search_events]
      meta: [meta_marketing_get_ad_accounts, meta_marketing_get_campaigns]
      neon: [list_projects, list_organizations, list_shared_projects, search]
      playwright: [browser_snapshot, browser_network_requests]

  INSPECT:
    description: Read detailed state of a known entity
    semantics: "Retrieve full representation of a single entity by ID"
    tools:
      notion: [notion-fetch]
      gmail: [gmail_read_threads]
      calendar: [google_calendar_get_event]
      meta: [meta_marketing_get_object]
      neon: [describe_project, describe_table_schema, get_database_tables, describe_branch, fetch, get_doc_resource, explain_sql_statement, get_connection_string]
      playwright: [browser_take_screenshot, browser_console_messages]

  CREATE:
    description: Instantiate a new entity
    semantics: "Add a new entity to the system, returning its identity"
    tools:
      notion: [notion-create-pages, notion-create-database, notion-create-comment, notion-create-view]
      gmail: [gmail_send_messages]  # draft mode
      calendar: [google_calendar_create_events]
      neon: [create_project, create_branch]
      playwright: [browser_tabs]  # create tab

  MUTATE:
    description: Modify an existing entity
    semantics: "Change properties or content of an entity in place"
    tools:
      notion: [notion-update-page, notion-update-data-source, notion-update-view]
      calendar: [google_calendar_update_events]
      playwright: [browser_fill_form, browser_type, browser_select_option]

  DESTROY:
    description: Remove an entity
    semantics: "Permanently delete an entity by ID"
    tools:
      calendar: [google_calendar_delete_events]
      neon: [delete_project, delete_branch]
      playwright: [browser_close]

  NAVIGATE:
    description: Traverse entity hierarchies or spatial structures
    semantics: "Move focus to a different location without creating or destroying"
    tools:
      notion: [notion-move-pages, notion-duplicate-page]
      playwright: [browser_navigate, browser_navigate_back, browser_tabs]

  COMPOSE:
    description: Execute complex operations that combine multiple primitives
    semantics: "Run a compound operation expressed in a domain-specific language"
    tools:
      gmail: [gmail_send_messages]  # send mode
      neon: [run_sql, run_sql_transaction]
      playwright: [browser_run_code, browser_evaluate]

  OBSERVE:
    description: Capture external state or metrics without modification
    semantics: "Read-only measurement of system state or performance"
    tools:
      meta: [meta_marketing_get_insights]
      neon: [list_slow_queries, list_branch_computes, compare_database_schema]
      playwright: [browser_take_screenshot, browser_network_requests, browser_console_messages]

  ORCHESTRATE:
    description: Manage multi-step processes with safety checkpoints
    semantics: "Prepare, verify, and commit a complex state transition"
    tools:
      neon: [prepare_database_migration, complete_database_migration, prepare_query_tuning, complete_query_tuning, reset_from_parent, provision_neon_auth, provision_neon_data_api]

  CLASSIFY:
    description: Categorize or organize entities
    semantics: "Apply labels, views, or taxonomies to existing entities"
    tools:
      gmail: [gmail_manage_labels]
      notion: [notion-create-view, notion-update-view]
      neon: [list_docs_resources]

# Composition Rules (Semiring)
composition:
  additive: "⊕"  # choice/alternative
  multiplicative: "⊗"  # sequential pipeline
  zero: "∅"  # impossible/failure
  one: "ε"  # identity/noop

# Common Sequence Templates
templates:
  discover_inspect:
    pattern: "DISCOVER ⊗ INSPECT"
    description: "Find then examine"
    example: "search(query) ⊗ fetch(id)"

  crud_lifecycle:
    pattern: "CREATE ⊗ INSPECT ⊗ MUTATE ⊗ DESTROY"
    description: "Full entity lifecycle"

  branch_test_commit:
    pattern: "CREATE(branch) ⊗ COMPOSE(test) ⊗ ORCHESTRATE(prepare) ⊗ ORCHESTRATE(commit)"
    description: "Safe migration with rollback"

  navigate_observe_act:
    pattern: "NAVIGATE ⊗ OBSERVE ⊗ (MUTATE ⊕ COMPOSE)"
    description: "Browser interaction pattern"

  hierarchical_drilldown:
    pattern: "DISCOVER(L0) ⊗ DISCOVER(L1) ⊗ ... ⊗ OBSERVE(Ln)"
    description: "Traverse hierarchy to leaf metrics"

  search_read_respond:
    pattern: "DISCOVER ⊗ INSPECT ⊗ COMPOSE"
    description: "Communication workflow"

  classify_organize:
    pattern: "DISCOVER ⊗ CLASSIFY ⊗ MUTATE"
    description: "Taxonomy application"
